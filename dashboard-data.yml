name: dashboard-data

on:
  schedule:
    # 평일 오전 7시 KST = 일~목 22:00 UTC (필요시 조정)
    - cron: "0 22 * * 0-4"
  workflow_dispatch:

permissions:
  contents: write     # dashboard_data.json 커밋용

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests OpenDartReader

      - name: Build dashboard data
        env:
          FRED_API_KEY:    ${{ secrets.FRED_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          DART_API_KEY:    ${{ secrets.DART_API_KEY }}
        run: python build_dashboard_data.py

      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add dashboard_data.json
          git commit -m "update dashboard data" || echo "no changes"
          git push
