name: dashboard-data

on:
  schedule:
    # 평일 하루 4회 (KST): 08:00 / 12:00 / 16:00 / 20:00
    - cron: "0 23 * * 0-4"   # 08:00 KST (= 전날 23:00 UTC)
    - cron: "0 3 * * 1-5"    # 12:00 KST
    - cron: "0 7 * * 1-5"    # 16:00 KST
    - cron: "0 11 * * 1-5"   # 20:00 KST
  workflow_dispatch:

permissions:
  contents: write     # dashboard_data.json 커밋용

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests OpenDartReader

      - name: Build dashboard data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python build_dashboard_data.py

      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add dashboard_data.json
          git commit -m "update dashboard data" || echo "no changes"
          git push
